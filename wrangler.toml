name = "echo-foundations"
compatibility_date = "2025-01-01"
pages_build_output_dir = "public"

# Vectorize index (for the Foundations chatbot — separate from ECHO's)
[[vectorize]]
binding = "VEC"
index_name = "echo-foundations-corpus"

# D1 database (audit log, sessions — separate from ECHO's)
[[d1_databases]]
binding = "DB"
database_name = "echo-foundations"
database_id = "f4c05f6f-a6c7-45a0-9ee8-327b7a275a76"

# Secrets (set via wrangler pages secret put ...):
#   OPENAI_API_KEY         — for the chatbot
#   GITHUB_TOKEN           — for sync-canonical to pull from ECHO-MANUAL
#   DEPLOY_PROBE_SECRET    — CI smoke-test header for *.pages.dev
