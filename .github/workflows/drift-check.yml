name: Drift Check (Foundations vs ECHO)

on:
  schedule:
    - cron: "17 7 * * *"    # daily at 07:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "content/canonical.from-echo.json"
      - "scripts/sync-canonical.mjs"
      - "scripts/drift-check.mjs"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: drift-check-foundations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Staleness guard applies only to push-triggered runs. Scheduled
      # + workflow_dispatch always run against latest main by design.
      - name: Staleness guard (push runs only)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          THIS_SHA="${{ github.sha }}"
          MAIN_SHA=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["sha"])')
          echo "This workflow's commit: $THIS_SHA"
          echo "Current main HEAD:      $MAIN_SHA"
          if [[ "$THIS_SHA" == "$MAIN_SHA" ]]; then
            echo "✓ This IS main HEAD"
            exit 0
          fi
          git fetch --no-tags --depth=20 origin main || true
          if git merge-base --is-ancestor "$THIS_SHA" "$MAIN_SHA" 2>/dev/null; then
            echo "✗ Skipping: main has moved past $THIS_SHA to $MAIN_SHA — a newer run will cover this."
            exit 1
          fi
          echo "⚠️  Diverged history; proceeding."

      - name: Validate secrets are present
        env:
          ECHO_MANUAL_READ_TOKEN: ${{ secrets.ECHO_MANUAL_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ECHO_MANUAL_READ_TOKEN:-}" ]; then
            echo "✖ ECHO_MANUAL_READ_TOKEN is missing — drift check cannot read ECHO-MANUAL."
            exit 1
          fi
          echo "✓ ECHO_MANUAL_READ_TOKEN present"
          echo "→ Verifying token can read ECHO-MANUAL…"
          status=$(curl -sS -o /tmp/repo.json -w "%{http_code}" \
            -H "Authorization: Bearer $ECHO_MANUAL_READ_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/angelanaeth/ECHO-MANUAL)
          if [ "$status" != "200" ]; then
            echo "✖ Token check failed (HTTP $status):"
            cat /tmp/repo.json
            exit 1
          fi
          echo "✓ Token can read ECHO-MANUAL"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Sync canonical from ECHO-MANUAL (no fail on drift)
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.ECHO_MANUAL_READ_TOKEN }}
        run: |
          set +e
          node scripts/sync-canonical.mjs
          rc=$?
          echo "sync_exit=$rc" >> "$GITHUB_OUTPUT"
          if [ $rc -eq 0 ] || [ $rc -eq 2 ]; then exit 0; else exit $rc; fi

      - name: Open drift PR if canonical changed
        if: steps.sync.outputs.sync_exit == '2'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: drift/canonical-${{ github.run_id }}
          base: main
          title: "Drift detected: Foundations canonical out of sync with ECHO"
          body: |
            The automated drift check detected that `shared/canonical.json` in the
            ECHO-MANUAL repo has changed since the last Foundations sync.

            This PR updates `content/canonical.from-echo.json` to match ECHO.

            **Review checklist:**
            - [ ] Confirm the ECHO change is intentional
            - [ ] Check whether any Foundations narrative prose mentions
                  these values and needs to be updated to match
            - [ ] Run `npm run drift-check` locally to scan for literal drift

            Triggered by: `${{ github.event_name }}`
            Workflow run: ${{ github.run_id }}
          commit-message: "chore(canonical): sync from ECHO-MANUAL"
          delete-branch: true
