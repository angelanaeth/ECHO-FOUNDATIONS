name: Deploy Foundations

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-foundations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─────────────────────────────────────────────────────────────
      # Staleness guard — refuses to deploy a superseded commit.
      # See ECHO-MANUAL DEPLOY.md for the bug this prevents:
      # Cloudflare Pages promotes the MOST RECENTLY FINISHED build
      # to canonical, regardless of the underlying commit's position
      # on main. If two runs finish out-of-order, an older-commit
      # build can overwrite a newer-commit canonical.
      # ─────────────────────────────────────────────────────────────
      - name: Staleness guard (refuse to deploy if newer commit exists on main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          THIS_SHA="${{ github.sha }}"
          MAIN_SHA=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["sha"])')
          echo "This workflow's commit: $THIS_SHA"
          echo "Current main HEAD:      $MAIN_SHA"
          if [[ "$THIS_SHA" == "$MAIN_SHA" ]]; then
            echo "✓ This IS main HEAD — safe to deploy"
            exit 0
          fi
          git fetch --no-tags --depth=20 origin main || true
          if git merge-base --is-ancestor "$THIS_SHA" "$MAIN_SHA" 2>/dev/null; then
            echo "✗ REFUSING TO DEPLOY: main has moved past $THIS_SHA to $MAIN_SHA"
            echo "  Deploying this older commit would roll back the newer canonical."
            echo "  Fix: re-dispatch this workflow against main via 'Run workflow' in the Actions tab,"
            echo "       or push a new commit to main."
            exit 1
          fi
          echo "⚠️  $THIS_SHA is NOT an ancestor of $MAIN_SHA (diverged history?)"
          echo "    Proceeding, but this is unusual — investigate if unexpected."

      # ─────────────────────────────────────────────────────────────
      # Validate every secret needed downstream is present AND that
      # the Cloudflare token still works. Cheaper to fail here than
      # to blow up mid-deploy.
      # ─────────────────────────────────────────────────────────────
      - name: Validate secrets are present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECHO_MANUAL_READ_TOKEN: ${{ secrets.ECHO_MANUAL_READ_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ECHO_MANUAL_READ_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "✖ Required secret $name is empty"
              missing=1
            else
              echo "✓ $name present"
            fi
          done
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "⚠️  OPENAI_API_KEY is NOT set — RAG rebuild will be skipped this run."
            echo "   The chatbot will continue serving whatever is already in Vectorize."
          else
            echo "✓ OPENAI_API_KEY present"
          fi
          if [ "$missing" -eq 1 ]; then
            echo "One or more required secrets are missing — aborting."
            exit 1
          fi
          echo "→ Checking Cloudflare API token is active…"
          resp=$(curl -sS -o /tmp/cf.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          if [ "$resp" != "200" ]; then
            echo "✖ CLOUDFLARE_API_TOKEN verify returned HTTP $resp"
            cat /tmp/cf.json
            exit 1
          fi
          status=$(python3 -c 'import json; print(json.load(open("/tmp/cf.json"))["result"]["status"])')
          if [ "$status" != "active" ]; then
            echo "✖ CLOUDFLARE_API_TOKEN is not active (status=$status)"
            exit 1
          fi
          echo "✓ Cloudflare API token is active"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Sync canonical from ECHO-MANUAL
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.ECHO_MANUAL_READ_TOKEN }}
        run: node scripts/sync-canonical.mjs || [ $? -eq 2 ]
        # exit 2 = drift detected, but we still want to deploy the fresh values

      - name: Expand canonical placeholders into HTML
        run: node scripts/expand-canonical.mjs

      - name: Drift check (Foundations vs ECHO canonical)
        run: node scripts/drift-check.mjs

      # ─────────────────────────────────────────────────────────────
      # RAG pipeline — chunks → embeddings → Vectorize sync.
      # These steps are best-effort: if OPENAI_API_KEY is missing or
      # something transient fails, we still ship the code changes.
      # Vectorize keeps whatever is already indexed.
      # ─────────────────────────────────────────────────────────────
      - name: Build chunks from Foundations HTML
        run: npm run build:chunks

      - name: Build embeddings (OpenAI)
        id: embed
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY not set — skipping embeddings build."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npm run build:embeddings
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Sync Vectorize (echo-foundations-corpus)
        if: steps.embed.outcome == 'success' && steps.embed.outputs.skipped != 'true'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run sync:vectorize

      - name: Stamp version.json with commit + build time
        run: |
          mkdir -p public
          cat > public/version.json <<EOF
          { "app": "echo-foundations", "commit": "${{ github.sha }}", "branch": "${{ github.ref_name }}", "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)" }
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=echo-foundations --branch=main

      - name: Wait for propagation
        run: sleep 30

      # ─────────────────────────────────────────────────────────────
      # Strong smoke test — asserts every binding the chatbot needs
      # is actually wired up in production. Mirrors what
      # functions/api/health.js reports.
      # ─────────────────────────────────────────────────────────────
      - name: Smoke test (foundations health + bindings)
        run: |
          set -euo pipefail
          echo "Checking /api/health on canonical…"
          curl -sS https://echo-foundations.pages.dev/api/health -o /tmp/health.json
          cat /tmp/health.json
          echo
          python3 - <<'PY'
          import json, sys
          body = json.load(open("/tmp/health.json"))
          required = ["ok", "has_openai_key", "has_vectorize", "has_audit_db", "has_github_token"]
          bad = [k for k in required if not body.get(k)]
          if bad:
              print("✖ health missing/false fields:", bad)
              sys.exit(1)
          print("✓ health ok — all bindings green:", {k: body[k] for k in required})
          PY
